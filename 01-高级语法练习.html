        }

        .blank :first-child {
            width: 0%;
            height: 100%;
            background-color: #d22128;


        }

        .blank:hover .acc {
            width: 100%;
            height: 100%;
            transition: all 3s;
        }

        .aaa {
            position: relative;
            top: 100px;
            left: 200px;
            width: 100px;
            height: 100px;
            background-color: #d22128;
        }

        .aaa:hover .a {

            background-position: 0px -274px;
            transition: all 3s;
        }

        .aaa:hover .b {

            transition: all 3s;
        }

        .aaa:hover .c {

            transition: all 3s;
        }

        .aaa:hover .d {

            background-position: -371px -412px;
            transition: all 3s;
        }

        .del {
            width: 0;
            height: 0;
            border-color: transparent red transparent transparent;
            border-style: solid;
            border-width: 20px 10px 0 0;
